// ===== TRAINER PROGRESS (standalone, localStorage) =====
class TrainerProgress {
  constructor(id, name, opts={}) {
    this.key = "trainer_" + id;
    this.displayName = name;
    this.subject = opts.subject || name;
    this.color = opts.color || "#4d96ff";
    this.icon = opts.icon || "📚";
    this._load();
  }
  _load() {
    try { const r = localStorage.getItem(this.key); this.data = r ? JSON.parse(r) : this._default(); }
    catch { this.data = this._default(); }
  }
  _default() {
    return { meta: { displayName: this.displayName, subject: this.subject, color: this.color, icon: this.icon }, sections: {}, lastUpdated: null };
  }
  _save() {
    this.data.lastUpdated = new Date().toISOString();
    this.data.meta = { displayName: this.displayName, subject: this.subject, color: this.color, icon: this.icon };
    try { localStorage.setItem(this.key, JSON.stringify(this.data)); } catch {}
    if (typeof this._onUpdate === "function") this._onUpdate();
  }
  onUpdate(fn) { this._onUpdate = fn; }
  getSection(id) { return this.data.sections[id] || { correct: 0, total: 0, theoryDone: false, bestStreak: 0 }; }
  updateSection(id, u) { this.data.sections[id] = { ...this.getSection(id), ...u }; this._save(); }
  markTheoryDone(id) { this.updateSection(id, { theoryDone: true }); }
  recordAnswer(id, ok) {
    const s = this.getSection(id);
    s.total++;
    if (ok) { s.correct++; s.currentStreak = (s.currentStreak||0)+1; s.bestStreak = Math.max(s.bestStreak||0, s.currentStreak); }
    else s.currentStreak = 0;
    this.data.sections[id] = s;
    this._save();
  }
  saveLastQuiz(id, correct, total) {
    const s = this.getSection(id);
    s.lastQuizCorrect = correct; s.lastQuizTotal = total;
    s.lastQuizPct = total > 0 ? Math.round(correct/total*100) : 0;
    this.data.sections[id] = s;
    this._save();
  }
  isMastered(id) {
    const s = this.getSection(id);
    if ((s.lastQuizPct||0) >= 70) return true;
    return (s.total||0) >= 5 && s.total > 0 && Math.round((s.correct||0)/s.total*100) >= 70;
  }
  getOverallStats(total) {
    let mastered = 0, totalCorrect = 0, totalAnswered = 0;
    Object.keys(this.data.sections).forEach(id => {
      const s = this.data.sections[id];
      if (this.isMastered(id)) mastered++;
      totalCorrect += s.correct||0;
      totalAnswered += s.total||0;
    });
    return {
      mastered, total: total||0,
      accuracy: totalAnswered > 0 ? Math.round(totalCorrect/totalAnswered*100) : 0,
      masteryPct: total > 0 ? Math.round(mastered/total*100) : 0
    };
  }
  reset() { this.data = this._default(); this._save(); }
}

// ===== NORMALIZE & CHECK =====
function normalize(s){
  return s.toLowerCase().trim()
    .replace(/[''`]/g,"'")
    .replace(/\s+/g," ")
    .replace(/[.!?,;:]+$/,"");
}
function stripArticle(s){
  return s.replace(/^(de |het |een |'t |the |a |an )/,"").trim();
}
function checkAnswer(input, correctStr){
  const inp = normalize(input);
  if(!inp) return false;
  const alts = correctStr.split("/").map(a=>normalize(a.trim()));
  if(alts.some(a=>a===inp)) return true;
  // strip parentheses content like "(on the) left"
  if(alts.some(a=>{
    const base = normalize(a.replace(/\s*\([^)]*\)/g," ").replace(/\s+/g," ").trim());
    return base && base === inp;
  })) return true;
  // also accept with/without leading Dutch/English article
  const inpNoArt = stripArticle(inp);
  if(alts.some(a=>stripArticle(a) === inp || a === inpNoArt || stripArticle(a) === inpNoArt)) return true;
  return false;
}

// ===== QUESTION GENERATORS =====
function makeMixedQs(list, secId, n){
  const shuffled = [...list].sort(()=>Math.random()-0.5).slice(0,n);
  return shuffled.map(([en,nl])=>{
    if(Math.random() < 0.5){
      return {q:"Wat betekent:\n"+en, a:nl, secId};
    } else {
      // For NL→EN, show only the cleanest Dutch form (first alternative)
      const cue = nl.split("/")[0];
      return {q:"Vertaal naar het Engels:\n"+cue, a:en, secId};
    }
  });
}
function makeAllQs(n){
  const pool = [];
  SECTIONS.filter(s=>s.data).forEach(sec=>{
    sec.data.forEach(pair=>pool.push({pair, secId:sec.id}));
  });
  const picked = pool.sort(()=>Math.random()-0.5).slice(0, n);
  return picked.map(({pair:[en,nl], secId})=>{
    if(Math.random() < 0.5){
      return {q:"Wat betekent:\n"+en, a:nl, secId};
    } else {
      const cue = nl.split("/")[0];
      return {q:"Vertaal naar het Engels:\n"+cue, a:en, secId};
    }
  });
}
function genToetsQs(){
  // Mix from each section
  const qs = [
    ...makeMixedQs(DIEREN, "dieren", 3),
    ...makeMixedQs(NATUUR, "natuur", 2),
    ...makeMixedQs(WEER, "weer", 2),
    ...makeMixedQs(SPORT, "sport", 2),
    ...makeMixedQs(ETEN, "eten", 3),
    ...makeMixedQs(VERPAKKING, "verpakking", 2),
    ...makeMixedQs(BIJV, "bijv", 1),
  ];
  return qs.sort(()=>Math.random()-0.5).slice(0, 15);
}

// ===== MAIN APP =====
function App(){
  const[version,setVersion]=useState(0);
  useEffect(()=>{progress.onUpdate(()=>setVersion(v=>v+1));},[]);
  const[mode,setMode]=useState("home");
  const[activeSec,setActiveSec]=useState(null);

  const[qIdx,setQIdx]=useState(0);
  const[score,setScore]=useState({correct:0,total:0});
  const[answered,setAnswered]=useState(null);
  const[wrongAnswers,setWrongAnswers]=useState([]);
  const[,forceUpdate]=useState(0);

  const {tag, pBar} = window.TrainerUI;
  const getSt=(id)=>{const s=progress.getSection(id);return{...s,mastered:progress.isMastered(id),pct:s.total>0?Math.round(s.correct/s.total*100):0}};
  const overall=progress.getOverallStats(SECTIONS.length);

  const startTheory=(secId)=>{setActiveSec(secId);setStep(0);setMode("theory")};

  const startPractice=(secId)=>{
    let qs;
    const sec = SECTIONS.find(s=>s.id===secId);
    if(secId==="toets")       qs = genToetsQs();
    else if(secId==="oneindig") qs = makeAllQs(20);
    else if(sec && sec.data)  qs = makeMixedQs(sec.data, secId, Math.min(sec.data.length, 14));
    else qs = [];
    setActiveSec(secId);setQuestions(qs);setQIdx(0);setScore({correct:0,total:0});setAnswered(null);setWrongAnswers([]);setMode("practice");
  };

  const handleAnswer=(input)=>{
    if(answered!==null)return;
    const q=questions[qIdx];
    const ok=checkAnswer(input,q.a);
    setAnswered({ok,correct:q.a});
    if(!ok){
      setWrongAnswers(w=>[...w,{q:q.q,chosen:input,correct:q.a}]);
      if(activeSec==="oneindig"){
        setQuestions(prev=>{
          const next=[...prev];
          next.splice(Math.min(qIdx+3,next.length),0,{...q});
          return next;
        });
      }
    }
    progress.recordAnswer(q.secId||activeSec,ok);
    setScore(s=>({correct:s.correct+(ok?1:0),total:s.total+1}));
    forceUpdate(n=>n+1);
  };

  const nextQ=()=>{
    if(activeSec==="oneindig"){
      if(questions.length-(qIdx+1)<=6) setQuestions(prev=>[...prev,...makeAllQs(15)]);
      setQIdx(qIdx+1);
      setAnswered(null);
      return;
    }
    if(qIdx+1<questions.length){setQIdx(qIdx+1);setAnswered(null)}
    else{progress.saveLastQuiz(activeSec,score.correct,score.total);setMode("results")}
  };

  // ===== HOME =====

              React.createElement("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},

                  React.createElement("div",{style:{fontSize:"11px",color:"#777"}},sec.desc," · ",st.total," vragen",st.total>0?" ("+st.pct+"%)":""))),

              React.createElement("button",{style:{flex:1,padding:"10px",borderRadius:"10px",border:"none",background:"rgba(255,255,255,0.08)",color:"#fff",fontSize:"13px",fontWeight:700},onClick:()=>startPractice(sec.id)},sec.id==="toets"?"📝 Toets starten":"✏️ Oefenen")))
        }),
        React.createElement("div",{style:{background:"linear-gradient(135deg,"+COL+"18,"+COL+"08)",borderRadius:"16px",padding:"16px",border:"1px solid "+COL+"30",marginBottom:"10px"}},
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}},
            React.createElement("span",{style:{fontSize:"22px"}},"♾️"),
            React.createElement("div",null,
              React.createElement("div",{style:{fontSize:"14px",fontWeight:700,color:"#fff"}},ONEINDIG.title),
              React.createElement("div",{style:{fontSize:"11px",color:"#888"}},ONEINDIG.desc))),
          React.createElement("button",{
            style:{width:"100%",padding:"12px",borderRadius:"10px",border:"none",background:COL,color:"#fff",fontSize:"14px",fontWeight:800},
            onClick:()=>startPractice("oneindig")},"▶ Start")),
        React.createElement("div",{style:{marginTop:"16px",textAlign:"right"}},
          React.createElement("button",{style:{padding:"10px 16px",borderRadius:"10px",border:"none",background:"rgba(255,255,255,0.03)",color:"#555",fontSize:"12px",fontWeight:600},onClick:()=>{if(confirm("Reset alle voortgang?")){progress.reset();forceUpdate(n=>n+1)}}},"🔄 Reset voortgang"))
      ));
  }

  // ===== THEORY =====
  if(mode==="theory"){
    const steps=THEORY[activeSec];
    const sec=SECTIONS.find(s=>s.id===activeSec);
    const cs=steps[step];
    const isLast=step===steps.length-1;
    const renderText=(text)=>text.split("\n").map((line,i)=>{
      const parts=line.split(/(\*\*[^*]+\*\*|\*[^*]+\*)/g);
      return React.createElement("div",{key:i,style:{marginBottom:line===""?"8px":"4px"}},
        parts.map((p,j)=>{
          if(p.startsWith("**")&&p.endsWith("**"))return React.createElement("strong",{key:j,style:{color:"#fff"}},p.slice(2,-2));
          if(p.startsWith("*")&&p.endsWith("*"))return React.createElement("em",{key:j,style:{color:COL}},p.slice(1,-1));

        pBar(((step+1)/steps.length)*100,COL,"4px"),
        React.createElement("div",{key:step,className:"fade-in",style:{marginTop:"20px"}},
          cs.type==="explain"&&React.createElement("div",{style:{background:cBg,borderRadius:"16px",padding:"20px",border:"1px solid "+bdr}},
            React.createElement("div",{style:{fontSize:"12px",color:COL,fontWeight:700,marginBottom:"6px"}},"📖 THEORIE"),
            React.createElement("div",{style:{fontSize:"18px",fontWeight:800,marginBottom:"12px"}},cs.title),
            React.createElement("div",{style:{fontSize:"14px",lineHeight:1.8,color:"#ccc"}},renderText(cs.text))),

            React.createElement("button",{style:{flex:2,padding:"12px",borderRadius:"12px",border:"none",background:COL,color:"#fff",fontSize:"14px",fontWeight:800},onClick:()=>{
              if(isLast){progress.markTheoryDone(activeSec);forceUpdate(n=>n+1);setMode("home")}else setStep(step+1)
            }},isLast?"✅ Theorie afgerond!":"Volgende →"))
        )));
  }

  // ===== PRACTICE =====
  if(mode==="practice"){
    const q=questions[qIdx];
    const isOneindig=activeSec==="oneindig";
    const sec=activeSec?([...SECTIONS,ONEINDIG].find(s=>s.id===activeSec)):null;
    return React.createElement("div",{style:{minHeight:"100vh"}},
      React.createElement("div",{style:{background:"rgba(0,0,0,0.3)",backdropFilter:"blur(12px)",borderBottom:"1px solid "+bdr,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50}},
        React.createElement("button",{style:{background:"none",border:"none",color:"#666",fontSize:"16px"},onClick:()=>setMode("home")},"✕"),
        React.createElement("div",{style:{fontSize:"14px",fontWeight:700,color:COL}},sec?sec.icon+" "+sec.title:"\u{1F1EC}\u{1F1E7} Engels"),
        isOneindig
          ?React.createElement("div",{style:{display:"flex",gap:"10px"}},
              React.createElement("span",{style:{fontSize:"13px",color:"#6bcb77",fontWeight:700}},"✓ "+score.correct),
              React.createElement("span",{style:{fontSize:"13px",color:"#ff6b6b",fontWeight:700}},"✕ "+(score.total-score.correct)))
          :React.createElement("div",{style:{fontSize:"12px",color:"#666"}},(qIdx+1)+"/"+questions.length)),
      React.createElement("div",{style:{maxWidth:"640px",margin:"0 auto",padding:"20px 14px 60px"}},
        !isOneindig&&pBar(((qIdx+1)/questions.length)*100,COL,"4px"),
        !isOneindig&&React.createElement("div",{style:{display:"flex",justifyContent:"center",gap:"16px",marginTop:"12px",marginBottom:"16px"}},
          React.createElement("span",{style:{fontSize:"13px",color:"#6bcb77"}},"✓ "+score.correct),
          React.createElement("span",{style:{fontSize:"13px",color:"#ff6b6b"}},"✕ "+(score.total-score.correct))),
        isOneindig&&React.createElement("div",{style:{textAlign:"center",padding:"12px 0 16px",fontSize:"13px",color:"#666"}},"Vraag "+(qIdx+1)+" · fouten komen terug"),
        React.createElement("div",{key:qIdx,className:"fade-in"},
          React.createElement(TypeQuestion,{q,answered,onAnswer:handleAnswer,onNext:nextQ,isLast:!isOneindig&&(qIdx+1>=questions.length),col:COL}))));
  }

  // ===== RESULTS =====
  if(mode==="results"){
    const pct=score.total>0?Math.round(score.correct/score.total*100):0;

// ===== TYPE QUESTION COMPONENT =====
function TypeQuestion({q, answered, onAnswer, onNext, isLast, col}){
  const[input,setInput]=useState("");
  const inputRef=useRef(null);

  useEffect(()=>{setInput("");if(inputRef.current)inputRef.current.focus()},[q]);

  const submit=()=>{if(!input.trim()||answered)return;onAnswer(input)};
  const handleKey=(e)=>{if(e.key==="Enter")answered?onNext():submit()};
  const cls=answered?(answered.ok?"correct":"wrong"):"";

  return React.createElement("div",null,
    React.createElement("div",{style:{background:cBg,borderRadius:"16px",padding:"20px",border:"1px solid "+bdr,marginBottom:"16px"}},
      React.createElement("div",{style:{fontSize:"16px",fontWeight:700,lineHeight:1.6,whiteSpace:"pre-line",color:"#fff"}},q.q)),
    React.createElement("input",{
      ref:inputRef,type:"text",className:cls,value:input,
      onChange:e=>setInput(e.target.value),
      onKeyDown:handleKey,
      placeholder:"Typ je antwoord...",
      disabled:!!answered,
      style:{marginBottom:"10px"}}),
    answered&&React.createElement("div",{style:{borderRadius:"12px",padding:"14px 16px",marginBottom:"12px",background:answered.ok?"rgba(107,203,119,0.12)":"rgba(255,107,107,0.12)",border:"1px solid "+(answered.ok?"rgba(107,203,119,0.3)":"rgba(255,107,107,0.3)")}},
      React.createElement("div",{style:{fontSize:"14px",fontWeight:700,color:answered.ok?"#6bcb77":"#ff6b6b",marginBottom:answered.ok?0:6}},answered.ok?"✓ Goed!":"✗ Fout"),
      !answered.ok&&React.createElement("div",{style:{fontSize:"15px",color:"#fff",fontWeight:700}},answered.correct)),
    !answered
      ?React.createElement("button",{style:{width:"100%",padding:"14px",borderRadius:"14px",border:"none",background:col,color:"#fff",fontSize:"15px",fontWeight:800},onClick:submit},"Controleer →")
      :React.createElement("button",{style:{width:"100%",padding:"14px",borderRadius:"14px",border:"none",background:col,color:"#fff",fontSize:"15px",fontWeight:800},onClick:onNext},isLast?"Bekijk resultaat":"Volgende vraag →"));
}

// ===== THEORY CHECK (type-in) =====
function ThCheck({step, secId}){
  const[input,setInput]=useState("");
  const[result,setResult]=useState(null);
  const inputRef=useRef(null);
  useEffect(()=>{if(inputRef.current)inputRef.current.focus()},[]);

  const submit=()=>{
    if(!input.trim()||result)return;
    const ok=checkAnswer(input,step.answer);
    setResult({ok,correct:step.answer});
    progress.recordAnswer(secId,ok);
  };
  const handleKey=(e)=>{if(e.key==="Enter")submit()};
  const cls=result?(result.ok?"correct":"wrong"):"";

  return React.createElement("div",{style:{background:"rgba(77,150,255,0.08)",borderRadius:"16px",padding:"20px",border:"1px solid rgba(77,150,255,0.2)"}},
    React.createElement("div",{style:{fontSize:"12px",color:"#4d96ff",fontWeight:700,marginBottom:"6px"}},"❓ CHECK"),
    React.createElement("div",{style:{fontSize:"16px",fontWeight:700,marginBottom:"14px",whiteSpace:"pre-line"}},step.question),
    React.createElement("input",{
      ref:inputRef,type:"text",className:cls,value:input,
      onChange:e=>setInput(e.target.value),
      onKeyDown:handleKey,
      placeholder:"Typ je antwoord...",
      disabled:!!result,
      style:{marginBottom:"10px"}}),
    result&&React.createElement("div",{style:{padding:"10px 14px",borderRadius:10,marginBottom:10,background:result.ok?"rgba(107,203,119,0.1)":"rgba(255,107,107,0.1)",border:"1px solid "+(result.ok?"rgba(107,203,119,0.3)":"rgba(255,107,107,0.3)")}},
      React.createElement("div",{style:{fontSize:"14px",fontWeight:700,color:result.ok?"#6bcb77":"#ff6b6b"}},result.ok?"✓ Correct!":"✗ Fout — juist antwoord: "+result.correct)),
    !result&&React.createElement("button",{
      style:{padding:"10px 16px",borderRadius:10,border:"none",background:"rgba(77,150,255,0.2)",color:"#4d96ff",fontSize:"13px",fontWeight:700},
      onClick:submit},"Controleer"));
}
